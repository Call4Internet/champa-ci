name: Build and Release Champa Client

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ] 
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build champa-client
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: darwin
            goarch: arm64
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build champa-client for ${{ matrix.goos }} / ${{ matrix.goarch }}
        run: |
          mkdir -p build/
          cd champa-client
          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}
          export OUTPUT="../build/champa-client-${GOOS}-${GOARCH}"
          if [ "${GOOS}" = "windows" ]; then
            OUTPUT="${OUTPUT}.exe"
          fi
          go build -o "${OUTPUT}" .

      - name: Upload binaries (debug only)
        run: ls -lh build/

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Rebuild all binaries for release
        run: |
          mkdir -p build/
          cd champa-client
          for GOOS in linux windows darwin; do
            for GOARCH in amd64 arm64; do
              if [ "$GOOS" = "darwin" ] && [ "$GOARCH" = "arm64" ]; then continue; fi
              export GOOS=$GOOS
              export GOARCH=$GOARCH
              OUTPUT="../build/champa-client-${GOOS}-${GOARCH}"
              if [ "$GOOS" = "windows" ]; then
                OUTPUT="${OUTPUT}.exe"
              fi
              go build -o "$OUTPUT" .
            done
          done

      - name: List binaries (debug)
        run: ls -lh build/

      - name: Create GitHub Release and Upload Binaries
        uses: softprops/action-gh-release@v1
        with:
          files: build/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
