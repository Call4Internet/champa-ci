name: Build Champa Client

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ] 
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build champa-client
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: darwin
            goarch: arm64
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build champa-client for ${{ matrix.goos }} / ${{ matrix.goarch }}
        run: |
          cd champa-client
          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}
          export OUTPUT="champa-client-${GOOS}-${GOARCH}"
          if [ "${GOOS}" = "windows" ]; then
            OUTPUT="${OUTPUT}.exe"
          fi
          go build -o ../build/${OUTPUT} .

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: champa-client-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/

  release:
    name: Release binaries
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')  # Only run on tag pushes like v1.0.0
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List downloaded artifacts (debug)
        run: ls -R ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
