name: Release Champa Client

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and Release champa-client
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: darwin
            goarch: arm64
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build champa-client for ${{ matrix.goos }} / ${{ matrix.goarch }}
        run: |
          mkdir -p build
          cd champa-client
          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}
          export EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          export OUTPUT="../build/champa-client-${GOOS}-${GOARCH}${EXT}"
          go build -o "$OUTPUT" .
          cd ../build
          sha256sum "champa-client-${GOOS}-${GOARCH}${EXT}" >> SHA256SUMS.txt

      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/champa-client-*
            build/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
