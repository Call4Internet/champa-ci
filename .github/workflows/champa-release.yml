name: Release Champa Client

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and Release champa-client
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: darwin
            goarch: arm64
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build champa-client for ${{ matrix.goos }}/${{ matrix.goarch }}
        run: |
          mkdir -p build
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          OUTFILE="champa-client-${{ matrix.goos }}-${{ matrix.goarch }}$EXT"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o "build/$OUTFILE" .
          echo "$OUTFILE" >> build/artifacts.txt

      - name: Calculate SHA256 checksums
        if: ${{ matrix.goos == 'linux' && matrix.goarch == 'amd64' }}  # Only run once
        run: |
          cd build
          for f in champa-client-*; do
            sha256sum "$f"
          done > SHA256SUMS.txt

      - name: Upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/champa-client-*
            build/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
